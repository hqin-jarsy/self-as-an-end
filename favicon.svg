<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Institutional layer: boundary condition, outline only -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#2c2c8c" stroke-width="2"/>
  <!-- Relational layer: transmission medium, outline only -->
  <rect x="8" y="8" width="16" height="16" fill="none" stroke="#2c2c8c" stroke-width="2"/>
  <!-- Individual layer: the end/purpose itself, filled solid -->
  <rect x="13" y="13" width="6" height="6" fill="#2c2c8c"/>
</svg>
